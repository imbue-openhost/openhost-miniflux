[app]
name = "miniflux"
version = "0.2.0"
description = "Miniflux minimalist RSS reader with built-in PostgreSQL and OpenHost SSO"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/healthcheck"
# Only the health-check endpoint is exposed unauthenticated so the OpenHost
# router can probe liveness. Every other path goes through the container's
# auth-proxy sidecar which enforces the zone_auth cookie before forwarding
# to Miniflux. Miniflux itself listens on loopback inside the container so
# traffic from outside the container cannot bypass the sidecar.
public_paths = ["/healthcheck"]

[resources]
memory_mb = 512
cpu_millicores = 250

[data]
app_data = true
